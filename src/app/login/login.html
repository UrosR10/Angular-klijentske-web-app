
<mat-card class="small-card">
    <mat-card-header>
        <h1>Login</h1>
    </mat-card-header>
    <mat-card-content>
        <div >
            <mat-form-field class="full-width">
                <mat-label>E-mail</mat-label>
                <input matInput type="email" [(ngModel)]="email" >
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Password</mat-label>
                <input  matInput [type]="hide ? 'password' : 'text'" [(ngModel)]="password">
                <button mat-icon-button
                    matSuffix
                    (click)="hide = !hide">
                <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            </mat-form-field>
        </div>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" matButton (click)="doLogin()"> <mat-icon fontIcon="login" /> Submit</button>
    </mat-card-actions>
</mat-card>
